name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  gate:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (core + dev only — no model stack)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # The gate runs entirely on the deterministic fakes; the real-model tests are gated
      # behind CB_LIVE and skip here, so CI needs neither network nor model weights.
      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q
