name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # weekly (Mon 06:00 UTC) — runs the CB_SLOW slow lane

jobs:
  gate:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (core + dev only — no model stack)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # The gate runs entirely on the deterministic fakes; the real-model tests are gated
      # behind CB_LIVE and skip here, so CI needs neither network nor model weights.
      - name: Lint
        run: ruff check .

      - name: Type-check
        run: mypy

      - name: Test
        run: pytest -q --cov=curated_brain --cov-report=term

  slow:
    name: slow lane (CB_SLOW, weekly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # [scale] is needed so the CB_SLOW-gated load test (which requires hnswlib) actually
      # RUNS here instead of skipping — the whole point of this lane.
      - name: Install (dev + scale — no model stack)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,scale]"

      # The slow lane runs the same offline gate with CB_SLOW=1 so any longer-running,
      # slow-gated tests execute. CB_LIVE is intentionally NOT set here — the real-model
      # tests need a local model and stay a local-nightly concern (see CONTRIBUTING.md).
      - name: Test (slow lane)
        run: CB_SLOW=1 python -m pytest -q

  integrations:
    name: adoption extras (mcp + langchain + llama-index + scale)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install the adoption surfaces' extras so their tests RUN instead of skipping. The
      # [local] model stack is intentionally excluded (heavy; its tests stay behind CB_LIVE).
      - name: Install (dev + mcp + langchain + llama-index + scale)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp,langchain,llama-index,scale]"

      # Guard: with the extras present, the MCP / LangChain / LlamaIndex / ANN suites must
      # EXECUTE, not skip — otherwise a regression in those shipped features would pass CI.
      - name: Integration tests must run (zero skips)
        run: |
          set -o pipefail
          pytest tests/test_mcp.py tests/test_langchain.py tests/test_llama_index.py \
            tests/test_ann.py -q -rs | tee /tmp/integ.txt
          if grep -q "skipped" /tmp/integ.txt; then
            echo "::error::an adoption extra is missing — MCP/LangChain/LlamaIndex/ANN tests skipped in CI"
            exit 1
          fi

      - name: Full suite (with adoption extras)
        run: pytest -q
